_schema-version: 3.3.0
ID: Claims_Project
version: 1.0.0

modules:
  - name: Claims_Project-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: Claims_Project-db
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    parameters:
      buildpack: nodejs_buildpack

  - name: Claims_Project-db-deployer
    type: hdb
    path: gen/db
    requires:
      - name: Claims_Project-db

resources:
  - name: Claims_Project-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production